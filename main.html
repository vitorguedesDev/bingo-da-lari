<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Bingo com Download</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Gerador de Bingo</h1>
        <label for="quantidade">Quantas cartelas?</label>
        <input type="number" id="quantidade" value="1" min="1" max="100">
        <button id="btn-gerar" class="btn-header">Gerar Novas Cartelas</button>
        <button id="btn-download-all" class="btn-header">Baixar todas</button>
    </header>

    <main>
        <div id="area-cartelas"></div>

        <template id="template-cartela">
            <div class="cartela-container">
                <table class="cartela">
                    <tr class="row-1">
                        <td class="b"></td>
                        <td class="i"></td>
                        <td class="n"></td>
                        <td class="g"></td>
                        <td class="o"></td>
                    </tr>
                    <tr class="row-2">
                        <td class="b"></td>
                        <td class="i"></td>
                        <td class="n"></td>
                        <td class="g"></td>
                        <td class="o"></td>
                    </tr>
                    <tr class="row-3">
                        <td class="b"></td>
                        <td class="i"></td>
                        <td class="n curinga"></td>
                        <td class="g"></td>
                        <td class="o"></td>
                    </tr>
                    <tr class="row-4">
                        <td class="b"></td>
                        <td class="i"></td>
                        <td class="n"></td>
                        <td class="g"></td>
                        <td class="o"></td>
                    </tr>
                    <tr class="row-5">
                        <td class="b"></td>
                        <td class="i"></td>
                        <td class="n"></td>
                        <td class="g"></td>
                        <td class="o"></td>
                    </tr>
                </table>

                <button class="btn-download">
                    Baixar PNG
                </button>
            </div>
        </template>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
